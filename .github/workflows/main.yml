name: Build ChronoZen

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Compiler ChronoZen
        run: dotnet publish ChronoZen/ChronoZen.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true -o dist
      - name: Télécharger l'exe
        uses: actions/upload-artifact@v4
        with:
          name: ChronoZen
          path: dist/ChronoZen.exe
